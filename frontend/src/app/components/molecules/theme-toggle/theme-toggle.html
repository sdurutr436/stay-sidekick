<app-button
  variant="ghost"
  size="md"
  (click)="toggle()"
>
  <span
    class="theme-toggle__icon"
    [attr.aria-label]="themeService.isDark() ? 'Activar modo claro' : 'Activar modo oscuro'"
  >
    @if (themeService.isDark()) {
      <ng-icon name="phosphorSun" size="20" aria-hidden="true" />
    } @else {
      <ng-icon name="phosphorMoon" size="20" aria-hidden="true" />
    }
  </span>
</app-button>
