<input
  class="form-input"
  [id]="id"
  [type]="type"
  [placeholder]="placeholder"
  [value]="value"
  [disabled]="disabled"
  [attr.aria-label]="ariaLabel || null"
  [attr.aria-describedby]="ariaDescribedby || null"
  [attr.aria-invalid]="hasError || null"
  [attr.aria-required]="required || null"
  (input)="onInput($event)"
/>
