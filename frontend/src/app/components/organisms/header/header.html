<header class="header">
  <div class="header__inner">

    <!-- Start: toggle hamburguesa (solo /menu) + brand -->
    <div class="header__start">
      @if (isMenuPage()) {
        <button
          class="header__nav-toggle"
          type="button"
          (click)="sidenavService.toggle()"
          [attr.aria-label]="sidenavService.isOpen() ? 'Cerrar menú lateral' : 'Abrir menú lateral'"
          [attr.aria-expanded]="sidenavService.isOpen()"
          aria-controls="sidenav-menu"
        >
          <svg
            class="svg svg--md"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            @if (sidenavService.isOpen()) {
              <!-- Icono X — cerrar -->
              <line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
              <line x1="20" y1="4" x2="4"  y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
            } @else {
              <!-- Icono hamburguesa — abrir -->
              <line x1="3" y1="6"  x2="21" y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
            }
          </svg>
        </button>
      }

      <!-- Brand: favicon en mobile (<768px), logo horizontal en tablet/desktop (≥768px) -->
      <a routerLink="/" class="header__brand" aria-label="Stay Sidekick — Menú principal">
        <picture>
          <source
            media="(max-width: 767px)"
            srcset="/img/favicon/stay-sidekick-fav-icon-512x512.png"
            type="image/png">
          <source
            srcset="/img/header/stay-sidekick-512x256-light-mode.webp 512w,
                    /img/header/stay-sidekick-1024x576-light-mode.webp 1024w"
            type="image/webp"
            sizes="(max-width: 767px) 120px, 160px">
          <source
            srcset="/img/header/stay-sidekick-512x256-light-mode.png 512w,
                    /img/header/stay-sidekick-1024x576-light-mode.png 1024w"
            type="image/png"
            sizes="(max-width: 767px) 120px, 160px">
          <img
            class="logo__img"
            src="/img/header/stay-sidekick-512x256-light-mode.png"
            alt="Stay Sidekick"
            width="512"
            height="256"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          >
        </picture>
      </a>
    </div>

    <!-- Acciones: sesión + CTA -->
    <nav class="header__actions" aria-label="Acciones de usuario">
      @if (auth.isLoggedIn()) {
        <a routerLink="/perfil" class="btn btn--secondary btn--md">
          <span class="btn__icon-mobile" aria-hidden="true">
            <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z"/></svg>
          </span>
          <span class="btn__label">Perfil</span>
        </a>
      } @else {
        <a href="/login" class="btn btn--secondary btn--md">
          <span class="btn__icon-mobile" aria-hidden="true">
            <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z"/></svg>
          </span>
          <span class="btn__label">Iniciar sesión</span>
        </a>
      }
      <a href="/solicitud" class="btn btn--primary btn--md">
        <span class="btn__icon-mobile" aria-hidden="true">
          <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M216,56H176V48a24,24,0,0,0-24-24H104A24,24,0,0,0,80,48v8H40A16,16,0,0,0,24,72V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V72A16,16,0,0,0,216,56ZM96,48a8,8,0,0,1,8-8h48a8,8,0,0,1,8,8v8H96ZM216,72v41.61A184.07,184.07,0,0,1,128,136a184.07,184.07,0,0,1-88-22.39V72Zm0,128H40V131.08A200.89,200.89,0,0,0,128,152a200.89,200.89,0,0,0,88-20.92V200ZM112,120a8,8,0,0,1,8-8h16a8,8,0,0,1,0,16H120A8,8,0,0,1,112,120Z"/></svg>
        </span>
        <span class="btn__label">Presentar solicitud</span>
      </a>
      <app-theme-toggle />
    </nav>

  </div>
</header>
