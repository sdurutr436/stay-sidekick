<header class="header">
  <div class="header__inner">

    <!-- Start: toggle hamburguesa (solo /menu) + brand -->
    <div class="header__start">
      @if (isMenuPage()) {
        <button
          class="header__nav-toggle"
          type="button"
          (click)="sidenavService.toggle()"
          [attr.aria-label]="sidenavService.isOpen() ? 'Cerrar menú lateral' : 'Abrir menú lateral'"
          [attr.aria-expanded]="sidenavService.isOpen()"
          aria-controls="sidenav-menu"
        >
          <svg
            class="svg svg--md"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            @if (sidenavService.isOpen()) {
              <!-- Icono X — cerrar -->
              <line x1="4" y1="4" x2="20" y2="20" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="20" y1="4" x2="4"  y2="20" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
            } @else {
              <!-- Icono hamburguesa — abrir -->
              <line x1="3" y1="6"  x2="21" y2="6"  stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="12" x2="21" y2="12" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="18" x2="21" y2="18" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
            }
          </svg>
        </button>
      }

      <!-- Brand: favicon en mobile, logo horizontal en tablet/desktop -->
      <a routerLink="/" class="header__brand" aria-label="Stay Sidekick — Menú principal">
        <picture>
          <source
            media="(max-width: 575px)"
            srcset="/img/favicon/stay-sidekick-fav-icon-512x512.png"
            type="image/png">
          <source
            srcset="/img/header/stay-sidekick-512x256-light-mode.webp 512w,
                    /img/header/stay-sidekick-1024x576-light-mode.webp 1024w"
            type="image/webp"
            sizes="(max-width: 767px) 120px, 160px">
          <source
            srcset="/img/header/stay-sidekick-512x256-light-mode.png 512w,
                    /img/header/stay-sidekick-1024x576-light-mode.png 1024w"
            type="image/png"
            sizes="(max-width: 767px) 120px, 160px">
          <img
            class="logo__img"
            src="/img/header/stay-sidekick-512x256-light-mode.png"
            alt="Stay Sidekick"
            width="512"
            height="256"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          >
        </picture>
      </a>
    </div>

    <!-- Acciones: sesión + CTA -->
    <nav class="header__actions" aria-label="Acciones de usuario">
      @if (auth.isLoggedIn()) {
        <a routerLink="/perfil" class="btn btn--secondary btn--md">
          <span class="btn__icon-mobile" aria-hidden="true">
            <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z"/></svg>
          </span>
          <span class="btn__label">Perfil</span>
        </a>
      } @else {
        <a href="/login" class="btn btn--secondary btn--md">
          <span class="btn__icon-mobile" aria-hidden="true">
            <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M141.66,133.66l-40,40a8,8,0,0,1-11.32-11.32L116.69,136H24a8,8,0,0,1,0-16h92.69L90.34,93.66A8,8,0,0,1,101.66,82.34l40,40A8,8,0,0,1,141.66,133.66ZM200,32H160a8,8,0,0,0,0,16h32V208H160a8,8,0,0,0,0,16h40a8,8,0,0,0,8-8V40A8,8,0,0,0,200,32Z"/></svg>
          </span>
          <span class="btn__label">Iniciar sesión</span>
        </a>
      }
      <a href="/solicitud" class="btn btn--primary btn--md">
        <span class="btn__icon-mobile" aria-hidden="true">
          <svg viewBox="0 0 256 256" fill="currentColor" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M213.66,82.34l-56-56A8,8,0,0,0,152,24H56A16,16,0,0,0,40,40V216a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V88A8,8,0,0,0,213.66,82.34ZM160,51.31,188.69,80H160ZM200,216H56V40h88V88a8,8,0,0,0,8,8h48V216Zm-32-80a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,136Zm0,32a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,168Z"/></svg>
        </span>
        <span class="btn__label">Presentar solicitud</span>
      </a>
    </nav>

  </div>
</header>
