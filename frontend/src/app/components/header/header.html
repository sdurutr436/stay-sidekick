<header class="header">
  <div class="header__inner">

    <!-- Start: toggle hamburguesa (solo /menu) + brand -->
    <div class="header__start">
      @if (isMenuPage()) {
        <button
          class="header__nav-toggle"
          type="button"
          (click)="sidenavService.toggle()"
          [attr.aria-label]="sidenavService.isOpen() ? 'Cerrar menú lateral' : 'Abrir menú lateral'"
          [attr.aria-expanded]="sidenavService.isOpen()"
          aria-controls="sidenav-menu"
        >
          <svg
            class="svg svg--md"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            @if (sidenavService.isOpen()) {
              <!-- Icono X — cerrar -->
              <line x1="4" y1="4" x2="20" y2="20" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="20" y1="4" x2="4"  y2="20" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
            } @else {
              <!-- Icono hamburguesa — abrir -->
              <line x1="3" y1="6"  x2="21" y2="6"  stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="12" x2="21" y2="12" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
              <line x1="3" y1="18" x2="21" y2="18" stroke="#2e2e2e" stroke-width="2" stroke-linecap="square"/>
            }
          </svg>
        </button>
      }

      <!-- Brand: ícono + nombre app -->
      <a href="/" class="header__brand logo" aria-label="Stay Sidekick — Inicio">
        <div class="logo__icon">
          <svg
            class="svg svg--lg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 32 32"
            fill="none"
            aria-hidden="true"
          >
            <rect x="2"  y="2"  width="28" height="28" rx="0" fill="#2e2e2e"/>
            <rect x="8"  y="14" width="6"  height="12" fill="#ffffff"/>
            <rect x="18" y="8"  width="6"  height="18" fill="#ffffff"/>
            <rect x="8"  y="8"  width="6"  height="4"  fill="#ffffff"/>
          </svg>
        </div>
        <span class="logo__name">Stay Sidekick</span>
      </a>
    </div>

    <!-- Acciones: sesión + CTA -->
    <nav class="header__actions" aria-label="Acciones de usuario">
      <button class="btn btn--secondary btn--md" type="button">
        Iniciar sesión
      </button>
      <a href="/solicitud" class="btn btn--primary btn--md">
        Presentar solicitud
      </a>
    </nav>

  </div>
</header>
