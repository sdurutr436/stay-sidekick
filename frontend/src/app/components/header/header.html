<header class="header">
  <div class="header__inner">

    <!-- Brand: ícono + nombre app -->
    <a href="/" class="header__brand logo" aria-label="Stay Sidekick — Inicio">
      <div class="logo__icon">
        <!-- Placeholder SVG wireframe del ícono de la app -->
        <svg
          class="svg svg--lg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="none"
          aria-hidden="true"
        >
          <!-- Forma blocky — wireframe -->
          <rect x="2" y="2" width="28" height="28" rx="0" fill="#2e2e2e"/>
          <rect x="8" y="14" width="6" height="12" fill="#ffffff"/>
          <rect x="18" y="8" width="6" height="18" fill="#ffffff"/>
          <rect x="8" y="8" width="6" height="4" fill="#ffffff"/>
        </svg>
      </div>
      <span class="logo__name">Stay Sidekick</span>
    </a>

    <!-- Acciones: sesión + CTA -->
    <nav class="header__actions" aria-label="Acciones de usuario">
      <button class="btn btn--secondary btn--md" type="button">
        Iniciar sesión
      </button>
      <a href="/solicitud" class="btn btn--primary btn--md">
        Presentar solicitud
      </a>
    </nav>

  </div>
</header>
