<!-- Layout de página de menú: sidenav lateral + contenido principal -->
<div class="menu-layout">

  <!-- Sidenav lateral (abre/cierra con el botón hamburguesa del header) -->
  @if (sidenavService.isOpen()) {
    <aside class="menu-layout__sidenav" aria-label="Panel de herramientas">
      <app-sidenav />
    </aside>
  }

  <!-- Área de contenido principal — renderiza la herramienta activa -->
  <section class="menu-layout__content" aria-label="Contenido principal">
    <router-outlet />
  </section>

</div>
