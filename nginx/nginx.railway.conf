# =============================================================================
# NGINX — Proxy inverso Railway (red privada .railway.internal)
#
# Diferencias respecto a nginx.conf (docker-compose):
#   - Resolver Railway (fd12::10) con TTL 1s para evitar cacheo de IPs.
#   - Variables set $var para forzar re-resolución DNS por petición.
#   - Hostnames .railway.internal en lugar de nombres de servicio docker.
#   - listen [::]:80 para dual-stack IPv4+IPv6 (healthchecks Railway).
#   - rewrite explícito en /menu porque proxy_pass con variable no elimina prefijos.
# =============================================================================

server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name localhost;

    # DNS resolver interno de Railway — TTL 1s evita IPs caducadas tras redeployos
    resolver [fd12::10] ipv6=on valid=1s;

    # Variables para forzar re-resolución DNS en cada petición
    # Los puertos se inyectan via envsubst al arrancar el contenedor
    set $frontend_url http://frontend-sidekick.railway.internal:${FRONTEND_PORT};
    set $web_url      http://estatica-sidekick.railway.internal:${WEB_PORT};
    set $backend_url  http://backend-sidekick.railway.internal:${BACKEND_PORT};

    # Página de error 404 servida por 11ty (genera /404/index.html)
    error_page 404 = /404/;

    # ── API Flask ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         $backend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA (/menu) ───────────────────────────────────────────────────
    # Autenticación gestionada por authGuard de Angular (lee localStorage).
    location /menu {
        rewrite ^/menu/?(.*)$ /$1 break;
        proxy_pass         $frontend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Subrequest interna de auth_request — no accesible directamente desde fuera
    location = /api/auth/validacion {
        internal;
        proxy_pass         $backend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Healthcheck propio (no depende de upstreams) ─────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok";
    }

    # ── Imágenes estáticas del frontend Angular ───────────────────────────────
    location /img/ {
        proxy_pass         $frontend_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── 11ty sitio estático (todo lo demás) ───────────────────────────────────
    location / {
        proxy_intercept_errors on;
        proxy_pass         $web_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # ── Content Security Policy ──────────────────────────────────────────
        # script-src: dominios Turnstile + hash del script inline de /404/
        #   + hash reportado por el navegador para el script inline de api.js.
        # style-src: 'unsafe-inline' necesario porque el widget inyecta estilos
        #   inline en el DOM del padre (no hay hash estable para ellos).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com 'sha256-Ig5A+5cewHBFUnM/P9kWkADehgoLk1wG8ReLwvNfLGQ=' 'sha256-eJGI0Ik4oYe/PKLDOt4wcN76wYs8h+Ew05pMzdY6xG8='; style-src 'self' https://fonts.googleapis.com https://challenges.cloudflare.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    }
}
