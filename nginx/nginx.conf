# =============================================================================
# NGINX — Proxy inverso principal
#
# Enrutamiento por prefijo:
#   /api/*   → backend Flask  (puerto 5000)
#   /menu/*  → Angular SPA    (puerto 80, base href /)
#   /*       → 11ty estático  (puerto 80)
# =============================================================================

upstream frontend_upstream {
    server frontend:80;
}

upstream web_upstream {
    server web:80;
}

upstream backend_upstream {
    server backend:5000;
}

server {
    listen 80;
    server_name localhost;

    # ── API Flask ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA — rutas de usuario (/menu) ───────────────────────────────
    location /menu {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Angular SPA — assets estáticos (/app/) ────────────────────────────────
    # Angular se compila con --base-href=/app/, por lo que sus chunks y CSS
    # se sirven bajo /app/. El rewrite elimina el prefijo antes del proxy.
    location /app/ {
        proxy_pass         http://frontend_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── 11ty sitio estático (todo lo demás) ───────────────────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
