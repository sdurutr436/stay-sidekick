# =============================================================================
# NGINX — Proxy inverso principal
#
# Enrutamiento por prefijo:
#   /api/*   → backend Flask  (puerto 5000)
#   /menu/*  → Angular SPA    (puerto 80, base href /)
#   /*       → 11ty estático  (puerto 80)
# =============================================================================

upstream frontend_upstream {
    server frontend:80;
}

upstream web_upstream {
    server web:80;
}

upstream backend_upstream {
    server backend:5000;
}

server {
    listen 80;
    server_name localhost;

    # Página de error 404 servida por 11ty (genera /404/index.html)
    error_page 404 = /404/;

    # ── API Flask ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA (/menu) ───────────────────────────────────────────────────
    # auth_request valida el JWT via Flask antes de servir la SPA.
    # 401 del subrequest → redirección 302 a /login (11ty).
    # LIMITACIÓN: auth_request lee el header Authorization de la petición HTTP,
    # no localStorage. Protege contra curl/scripts sin token; el AuthGuard
    # Angular protege la navegación en el navegador.
    location /menu {
        auth_request       /api/auth/verify;
        error_page 401     = @menu_unauth;
        proxy_intercept_errors on;
        rewrite ^/menu/?(.*)$ /$1 break;
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Destino interno de error_page 401 del bloque /menu
    location @menu_unauth {
        return 302 /login?acceso=requerido;
    }

    # Subrequest interna de auth_request — no accesible directamente desde fuera
    location = /api/auth/verify {
        internal;
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }


    # ── 11ty sitio estático (todo lo demás) ───────────────────────────────────
    location / {
        proxy_intercept_errors on;
        proxy_pass         $web_url;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
