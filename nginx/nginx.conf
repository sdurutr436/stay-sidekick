# NGINX LOCAL
# =============================================================================
# NGINX — Proxy inverso principal
#
# Enrutamiento por prefijo:
#   /api/*   → backend Flask  (puerto 5000)
#   /menu/*  → Angular SPA    (puerto 80, base href /)
#   /*       → 11ty estático  (puerto 80)
# =============================================================================

upstream frontend_upstream {
    server frontend:80;
}

upstream web_upstream {
    server web:80;
}

upstream backend_upstream {
    server backend:5000;
}

server {
    listen 80;
    server_name localhost;

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com 'sha256-Ig5A+5cewHBFUnM/P9kWkADehgoLk1wG8ReLwvNfLGQ=' 'sha256-eJGI0Ik4oYe/PKLDOt4wcN76wYs8h+Ew05pMzdY6xG8='; style-src 'self' https://fonts.googleapis.com https://challenges.cloudflare.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Página de error 404 servida por 11ty (genera /404/index.html)
    error_page 404 = /404/;

    # ── API Flask ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA (/menu) ───────────────────────────────────────────────────
    # Autenticación gestionada por authGuard de Angular (lee localStorage).
    location /menu {
        rewrite ^/menu/?(.*)$ /$1 break;
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Subrequest interna de auth_request — no accesible directamente desde fuera
    location = /api/auth/validacion {
        internal;
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }


    # ── Imágenes estáticas del frontend Angular ───────────────────────────────
    location /img/ {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── 11ty sitio estático (todo lo demás) ───────────────────────────────────
    location / {
        proxy_intercept_errors on;
        proxy_pass         http://web_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
