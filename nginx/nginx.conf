# =============================================================================
# NGINX — Proxy inverso principal
#
# Enrutamiento por prefijo:
#   /api/*   → backend Flask  (puerto 5000)
#   /app/*   → Angular SPA    (puerto 80, construido con --base-href=/app/)
#   /*       → 11ty estático  (puerto 80)
#
# nginx elimina el prefijo /app/ al hacer proxy a Angular gracias al
# trailing slash en proxy_pass (http://frontend_upstream/).
# =============================================================================

upstream frontend_upstream {
    server frontend:80;
}

upstream web_upstream {
    server web:80;
}

upstream backend_upstream {
    server backend:5000;
}

server {
    listen 80;
    server_name localhost;

    # ── API Flask ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA (/app/) ───────────────────────────────────────────────────
    # El trailing slash en proxy_pass elimina el prefijo /app antes de reenviar.
    # Ejemplo: /app/dashboard → http://frontend_upstream/dashboard
    # Angular Router gestiona la navegación; nginx sirve siempre index.html
    # para rutas desconocidas (ver frontend/nginx.conf).
    location /app/ {
        proxy_pass         http://frontend_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── 11ty sitio estático (todo lo demás) ───────────────────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
