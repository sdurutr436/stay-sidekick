# railway.toml para el servicio "web" (11ty).
# Root Directory del servicio debe estar vacío (raíz del repo) para que
# el Dockerfile pueda acceder a frontend/src/styles/ durante el build.

[build]
builder = "DOCKERFILE"
dockerfilePath = "web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
