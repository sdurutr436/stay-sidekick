name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  angular-build:
    name: Angular build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Compilar Angular
        run: npm run build
        working-directory: frontend

  web-build:
    name: 11ty build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: web

      - name: Compilar sitio estático
        run: npm run build
        working-directory: web
        env:
          TURNSTILE_SITE_KEY: ''

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/app
