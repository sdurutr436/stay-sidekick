name: CI Angular

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:
    name: Angular build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Compilar Angular
        run: npm run build
        working-directory: frontend
